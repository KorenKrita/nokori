[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nokori"
version = "0.1.0"
description = "Claude Code learning layer: extract rules from corrections, inject on match, enforce with a one-shot Gate. 从纠正中提炼规则并强制执行。残り — what experience leaves behind."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{name = "KorenKrita"}]
keywords = [
    "claude-code",
    "claude",
    "ai-coding",
    "coding-agent",
    "hooks",
    "gate",
    "bm25",
    "embeddings",
    "sqlite",
    "python",
    "learning",
    "rules",
    "memory",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0"]
# >=3.0 required: Granite uses encode_query / encode_document (ST 2.x lacks these).
local-embed = ["sentence-transformers>=3.0"]

[project.urls]
Homepage = "https://github.com/KorenKrita/nokori"
Repository = "https://github.com/KorenKrita/nokori"

[project.scripts]
nokori = "nokori.__main__:main"

[tool.setuptools.packages.find]
include = ["nokori*"]

[tool.setuptools.cmdclass]
install = "nokori._packaging.InstallWithPrefetch"
develop = "nokori._packaging.DevelopWithPrefetch"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"
