[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nokori"
version = "0.2.0"
description = "Local rule memory for Claude Code and Cursor—corrections distilled into lasting guidance, recalled in context, one deliberate gate when stakes are high. 经验留下的痕迹，比记忆更深。"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{name = "KorenKrita"}]
keywords = [
    "claude-code",
    "cursor",
    "cursor-ide",
    "hooks",
    "gate",
    "rules",
    "bm25",
    "embeddings",
    "sqlite",
    "python",
    "learning",
    "coding-agent",
    "ai-coding",
    "memory",
    "agent-hooks",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = ["fastapi>=0.104", "uvicorn[standard]>=0.24", "websockets>=12.0"]

[project.optional-dependencies]
dev = ["pytest>=7.0", "httpx>=0.27"]
# >=3.0 required: Granite uses encode_query / encode_document (ST 2.x lacks these).
local-embed = ["sentence-transformers>=3.0"]
web = ["fastapi>=0.104", "uvicorn[standard]>=0.24", "websockets>=12.0"]

[project.urls]
Homepage = "https://github.com/KorenKrita/nokori"
Repository = "https://github.com/KorenKrita/nokori"

[project.scripts]
nokori = "nokori.__main__:main"

[tool.setuptools.packages.find]
include = ["nokori*"]

[tool.setuptools.cmdclass]
install = "nokori._packaging.InstallWithPrefetch"
develop = "nokori._packaging.DevelopWithPrefetch"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"
