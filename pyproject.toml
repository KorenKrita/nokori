[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nokori"
version = "0.1.0"
description = "経験留下的痕迹。Claude Code learning layer — extracts rules from corrections, enforces them with a gate."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{name = "KorenKrita"}]
keywords = ["claude-code", "memory", "learning", "hooks", "gate"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.urls]
Homepage = "https://github.com/KorenKrita/nokori"
Repository = "https://github.com/KorenKrita/nokori"

[project.scripts]
nokori = "nokori.__main__:main"

[tool.setuptools.packages.find]
include = ["nokori*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"
