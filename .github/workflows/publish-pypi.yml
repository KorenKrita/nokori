# Build and upload to PyPI when a GitHub Release is published.
# API token lives in GitHub Secrets (never in the repo).

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Verify release tag matches pyproject version
        if: github.event_name == 'release'
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${{ github.event.release.tag_name }}"
          TAG_VER="${TAG#v}"
          if [ "$VERSION" != "$TAG_VER" ]; then
            echo "::error::pyproject.toml version ($VERSION) != release tag ($TAG_VER from $TAG)"
            exit 1
          fi

      - name: Install and verify
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python scripts/verify.py

      - name: Build sdist and wheel
        run: |
          python -m pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
