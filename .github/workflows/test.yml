name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run verification suite
        run: python scripts/verify.py

  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install package and coverage deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Optional hot-path coverage
        run: bash scripts/coverage.sh

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install and verify web UI
        run: |
          npm ci
          npm run lint
          npm test
          npm run build
      - name: Ensure committed static assets stay in sync
        working-directory: .
        run: git diff --exit-code -- nokori/web/static

  extension-bridges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Build generated Pi and OMP bridges
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from nokori.commands.install import _build_omp_hook_source, _build_pi_hook_source

          temp = Path(os.environ["RUNNER_TEMP"])
          temp.joinpath("nokori-pi.ts").write_text(_build_pi_hook_source(), encoding="utf-8")
          temp.joinpath("nokori-omp.ts").write_text(_build_omp_hook_source(), encoding="utf-8")
          PY
          bun build "$RUNNER_TEMP/nokori-pi.ts" \
            --target=bun \
            --external '@earendil-works/pi-coding-agent' \
            --outfile "$RUNNER_TEMP/nokori-pi.js"
          bun build "$RUNNER_TEMP/nokori-omp.ts" \
            --target=bun \
            --external '@oh-my-pi/pi-coding-agent/*' \
            --outfile "$RUNNER_TEMP/nokori-omp.js"
