# Upload to TestPyPI (manual). See .github/PUBLISHING.md §5.
# Requires secret TEST_PYPI_API_TOKEN from https://test.pypi.org (not pypi.org).

name: Publish to TestPyPI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and run tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pytest tests/ -q

      - name: Build sdist and wheel
        run: |
          python -m pip install build
          python -m build

      - name: Require TestPyPI token
        run: |
          if [ -z "${{ secrets.TEST_PYPI_API_TOKEN }}" ]; then
            echo "::error::Set repository secret TEST_PYPI_API_TOKEN (token from test.pypi.org, not pypi.org)"
            exit 1
          fi

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
